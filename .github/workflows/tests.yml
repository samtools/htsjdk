# This is a github actions workflow which runs htsjdk tests and spotbugs.

name: Build and Test
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    env:
      HTSJDK_SAMTOOLS_BIN: /usr/local/bin/samtools
      SAMTOOLS_VERSION: 1.23.1
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17 ]
        experimental: [false]
      fail-fast: false
    continue-on-error: ${{ matrix.experimental }}
    name: Java ${{ matrix.Java }} build and test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so palantir/git-version sees the latest release tag
      - name: Set up java ${{ matrix.Java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.Java }}
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Compile with Gradle
        run: ./gradlew compileJava
      - name: Cache samtools
        id: cache-samtools
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/samtools
          key: samtools-${{ env.SAMTOOLS_VERSION }}-${{ runner.os }}
      - name: Install Samtools
        if: steps.cache-samtools.outputs.cache-hit != 'true'
        run: scripts/install-samtools.sh
      - name: Start the htsget server
        run: scripts/htsget-scripts/start-htsget-test-server.sh
      - name: Run tests
        run: ./gradlew test jacocoTestReport
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.Java }}
          path: build/reports/tests
  testExternalApis:
    continue-on-error: true
    runs-on: ubuntu-latest
    name: Tests that require external APIs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so palantir/git-version sees the latest release tag
      - name: Set up java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Compile with Gradle
        run: ./gradlew compileJava
      - name: Run tests
        run: ./gradlew testExternalApis jacocoTestReport
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-external-apis
          path: build/reports/tests
  formatCheck:
    runs-on: ubuntu-latest
    name: Java Format Check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so palantir/git-version sees the latest release tag
      - name: Set up java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Verify formatting
        run: ./gradlew spotlessCheck
  spotBugs:
    runs-on: ubuntu-latest
    name: SpotBugs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so palantir/git-version sees the latest release tag
      - name: Set up java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Compile with Gradle
        run: ./gradlew spotBugsMain spotBugsTest
      - name: Upload spotBugs Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotBugs-Report
          path: build/reports/spotbugs
