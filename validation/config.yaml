# Dataset file: samples.tsv (local paths, 3 columns) or test_datasets.tsv (remote URLs, 9 columns)
dataset_file: "samples.tsv"

# Optional: restrict to specific samples (default: all samples in dataset_file).
# Uncomment and list sample names to run a subset, e.g. for testing downloads.
# samples:
#   - sarscov2_amplicon
#   - geuvadis_rnaseq

profiles:
  - fast
  - normal
  - small
  - archive

# Path to the htsjdk fat JAR (built with ./gradlew shadowJar).
# Supports glob patterns; if multiple match, the latest (alphabetically last) is used.
htsjdk_jar: "../build/libs/*-all.jar"

# Comparison mode: strict (all fields + tags) or lenient (name, flags, pos, bases, quals)
comparison_mode: "strict"

# Maximum mismatches to report per comparison
max_diffs: 10
